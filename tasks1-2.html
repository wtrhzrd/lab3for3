<!DOCTYPE html>
<html>
<head>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            color: #2c3e50;

</head>
<body>
    <h2>Проверка заданий 1 и 2</h2>
    <p>Результат первого задания выведен в консоль (F12), а второго - во всплывающее окно.</p>

    <script>
        // Задание 1: Нахождение минимума
        function min(a, b) {
            return a < b ? a : b;
        }
        console.log("Проверка Задания 1: минимум из 15 и 8 равен " + min(15, 8));

        // Задание 2: Переменные
        let admin;
        let name = "Дмитрий";
        admin = name;
        alert("Проверка Задания 2: " + admin);
    </script>
