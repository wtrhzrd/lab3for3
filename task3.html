<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Задание 3</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Занимает всю высоту экрана */
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            border-top: 5px solid #e74c3c;
        }
        h2 {
            margin-top: 0;
            color: #e74c3c;
        }
        p {
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Проверка задания 3</h2>
        <p>Скрипт циклического опроса возраста запущен.</p>
    </div>
    
    <script>
        let isConfirmed = false;

        while (!isConfirmed) {
            let age = prompt('Введите ваш возраст:', '20');
            
            if (age === null) {
                age = "неизвестно сколько"; 
            }

            isConfirmed = confirm('Вы уверены, что вам ' + age + '?');
        }

        alert('Спасибо! Ваш возраст подтвержден.');
    </script>
</body>
</html>
