<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Задание 3</title>
</head>
<body>
    <h2>Проверка задания 3</h2>
    <p>Скрипт циклического опроса возраста запущен.</p>

    <script>
        let isConfirmed = false;

        // Цикл работает, пока isConfirmed равно false
        while (!isConfirmed) {
            // Запрашиваем возраст
            let age = prompt('Введите ваш возраст:', '20');
            
            // Если нажали Отмена в самом prompt, age будет null. 
            // Заменяем null на пустую строку, чтобы confirm не выдавал "вам null?"
            if (age === null) {
                age = "неизвестно сколько"; 
            }

            // Уточняем возраст с кнопками ОК/Отмена
            isConfirmed = confirm('Вы уверены, что вам ' + age + '?');
        }

        // Этот код выполнится только когда цикл завершится (нажмут ОК)
        alert('Спасибо! Ваш возраст подтвержден.');
    </script>
</body>
</html>
